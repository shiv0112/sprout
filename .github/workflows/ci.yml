name: CI — Lint, Test, Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  # ── Python lint ────────────────────────────────────────────────────────
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install project with extras
        run: uv sync --all-extras
      - name: Ruff lint
        run: uv run ruff check packages/
      # Note: `ruff format --check` intentionally omitted — the repo has
      # never been format-enforced and rolling that in belongs in its own
      # PR with the format pass, not mixed with feature work.

  # ── Python tests (per-package — cross-package collection has a known
  # import-time FastAPI auth conflict; CI mirrors how we run locally) ────
  python-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - shared
          - registry_api
          - chat_backend
          - mcp_server
          - synthesis_service
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --all-extras
      - name: Pytest — packages/${{ matrix.package }}
        run: uv run pytest packages/${{ matrix.package }} -q

  # ── Wheel build + PyPI metadata validation ─────────────────────────────
  python-packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Build kiln-shared
        run: uv build --package kiln-shared
      - name: Build kiln-registry-api
        run: uv build --package kiln-registry-api
      - name: Validate metadata (twine check)
        run: uvx twine check dist/*
      - name: Smoke-test wheels in a fresh venv
        run: |
          python3 -m venv /tmp/smoketest
          /tmp/smoketest/bin/pip install dist/kiln_shared-*.whl dist/kiln_registry_api-*.whl
          /tmp/smoketest/bin/python -c "
          from kiln_shared import KilnTool, KilnToolSpec
          from kiln_registry.runtime import KilnRuntime, ADAPTERS
          assert set(ADAPTERS) == {'ag2', 'langchain', 'pydantic_ai', 'mistral'}, ADAPTERS
          print('smoke OK; targets:', list(ADAPTERS.keys()))
          "
      - name: Upload dist artefacts
        uses: actions/upload-artifact@v4
        with:
          name: kiln-dist
          path: dist/
          retention-days: 14

  # ── TypeScript + ESLint + Next build ───────────────────────────────────
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/registry_ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # No `version:` — let action-setup honour `packageManager` in
        # root package.json so we don't get a "multiple versions specified"
        # conflict.
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: packages/registry_ui/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: TypeScript
        run: pnpm exec tsc --noEmit
      - name: ESLint
        run: pnpm run lint

  # ── Docker images build (doesn't push — just proves they build) ────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [python-lint, python-test, frontend-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: registry_api
            module: kiln_registry.main:app
            port: "8766"
            image: registry-api
          - service: chat_backend
            module: kiln_chat_backend.main:app
            port: "8765"
            image: chat-backend
          - service: tool_executor
            module: kiln_executor.main:app
            port: "8767"
            image: tool-executor
          - service: mcp_server
            module: kiln_mcp.main:app
            port: "8768"
            image: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.python.prod
          build-args: |
            SERVICE=${{ matrix.service }}
            MODULE=${{ matrix.module }}
            PORT=${{ matrix.port }}
          tags: kiln-${{ matrix.image }}:ci
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
