services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kiln_registry
      POSTGRES_USER: kiln
      POSTGRES_PASSWORD: kiln_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiln -d kiln_registry"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Registry API (Python — port 8766) ───────────────────────────────────────
  registry_api:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    command: uv run uvicorn kiln_registry.main:app --host 0.0.0.0 --port 8766 --reload
    ports:
      - "8766:8766"
    volumes:
      - ./packages/shared/kiln_shared:/app/packages/shared/kiln_shared
      - ./packages/registry_api/kiln_registry:/app/packages/registry_api/kiln_registry
      - ./registry:/app/registry
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://kiln:kiln_dev@postgres:5432/kiln_registry
      - REDIS_URL=redis://redis:6379
      - TOOL_EXECUTOR_URL=http://tool_executor:8767
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8766/livez')"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tool_executor:
        condition: service_healthy

  # ── Chat Backend (Python — port 8765) ───────────────────────────────────────
  chat_backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    command: uv run uvicorn kiln_chat_backend.main:app --host 0.0.0.0 --port 8765 --reload
    ports:
      - "8765:8765"
    volumes:
      - ./packages/shared/kiln_shared:/app/packages/shared/kiln_shared
      - ./packages/chat_backend/kiln_chat_backend:/app/packages/chat_backend/kiln_chat_backend
      - ./packages/registry_api/kiln_registry:/app/packages/registry_api/kiln_registry
      - ./registry:/app/registry
    env_file: .env
    environment:
      - REGISTRY_URL=http://registry_api:8766
      - SYNTHESIS_URL=http://synthesis_service:8002
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
    depends_on:
      registry_api:
        condition: service_healthy

  # ── MCP Server (Python — port 8768) ─────────────────────────────────────────
  mcp_server:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    command: uv run python -m kiln_mcp.main streamable-http
    ports:
      - "8768:8768"
    volumes:
      - ./packages/shared/kiln_shared:/app/packages/shared/kiln_shared
      - ./packages/mcp_server/kiln_mcp:/app/packages/mcp_server/kiln_mcp
    env_file: .env
    environment:
      - KILN_REGISTRY_URL=http://registry_api:8766
      - KILN_MCP_HOST=0.0.0.0
      - KILN_MCP_ISSUER_URL=${KILN_MCP_ISSUER_URL:-http://localhost:8768}
      - CLERK_DOMAIN=${CLERK_DOMAIN:-}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
    depends_on:
      registry_api:
        condition: service_healthy

  # ── Tool Executor (Python — port 8767) ───────────────────────────────────────
  tool_executor:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    command: uv run uvicorn kiln_executor.main:app --host 0.0.0.0 --port 8767 --reload
    ports:
      - "8767:8767"
    volumes:
      - ./packages/shared/kiln_shared:/app/packages/shared/kiln_shared
      - ./packages/tool_executor/kiln_executor:/app/packages/tool_executor/kiln_executor
    env_file: .env
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8767/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Synthesis Service (port 8002) ───────────────────────────────────────────
  synthesis_service:
    build:
      context: .
      dockerfile: packages/synthesis_service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - KILN_SYNTHESIS_CALLBACK_URL=http://registry_api:8766/synthesis/callback
      - KILN_SYNTHESIS_INTERNAL_SECRET=${KILN_INTERNAL_SECRET:-}
      - KILN_SYNTHESIS_OPENCODE_MODEL=${KILN_SYNTHESIS_OPENCODE_MODEL:-mistral/codestral-latest}
      - PYTHONPATH=/app
    volumes:
      - synthesis_logs:/app/logs
      - ./packages/synthesis_service/kiln_synthesis:/app/kiln_synthesis
      - ./packages/shared/kiln_shared:/app/kiln_shared
    depends_on:
      registry_api:
        condition: service_healthy

  # ── Registry UI (Next.js — port 3001) ───────────────────────────────────────
  registry_ui:
    build:
      context: ./packages/registry_ui
      dockerfile: ../../docker/Dockerfile.nextjs
    command: npm run dev -- --hostname 0.0.0.0 -p 3001
    ports:
      - "3001:3001"
    volumes:
      - ./packages/registry_ui/src:/app/src
      - ./packages/registry_ui/public:/app/public
    environment:
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
      - NEXT_PUBLIC_REGISTRY_URL=http://localhost:8766
      - REGISTRY_API_INTERNAL=http://registry_api:8766
      - NEXT_PUBLIC_CHAT_BACKEND=http://localhost:8765
      - CHAT_BACKEND_INTERNAL=http://chat_backend:8765
      - NEXT_PUBLIC_MCP_SERVER_URL=http://localhost:8768
      - MCP_SERVER_INTERNAL=http://mcp_server:8768
      - NEXT_PUBLIC_TOOL_EXECUTOR_URL=http://localhost:8767
      - TOOL_EXECUTOR_INTERNAL=http://tool_executor:8767
      - NEXT_PUBLIC_SYNTHESIS_SERVICE_URL=http://localhost:8002
      - SYNTHESIS_SERVICE_INTERNAL=http://synthesis_service:8002
    depends_on:
      registry_api:
        condition: service_healthy
      chat_backend:
        condition: service_started

volumes:
  pgdata:
  redisdata:
  synthesis_logs:
