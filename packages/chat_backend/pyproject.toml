[project]
name = "kiln-chat-backend"
version = "1.0.0"
description = "Kiln Chat Backend - planning agent, graph executor, SSE streaming"
requires-python = ">=3.12"
dependencies = [
    "kiln-shared[server]>=1.0.0",
    "kiln-registry-api",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "httpx>=0.27.0",
    "requests>=2.31.0",
    "mistralai>=1.0.0",
    "pyautogen>=0.2.0,<0.4.0",
    "python-dotenv>=1.0.0",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["kiln_chat_backend"]

[tool.uv.sources]
kiln-shared = { workspace = true }
kiln-registry-api = { workspace = true }
