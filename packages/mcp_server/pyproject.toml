[project]
name = "sprout-mcp-server"
version = "1.0.0"
description = "Sprout MCP Server - bridges MCP JSON-RPC to the Registry API"
requires-python = ">=3.12"
dependencies = [
    "sprout-shared[server]>=1.0.0",
    "mcp>=1.0.0",
    "httpx>=0.27.0",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sprout_mcp"]

[tool.uv.sources]
sprout-shared = { workspace = true }
