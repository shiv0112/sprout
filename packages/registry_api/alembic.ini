# Alembic config for sprout_registry.
#
# The URL is resolved from the DATABASE_URL environment variable at runtime
# (see migrations/env.py), so the `sqlalchemy.url` line below is a placeholder
# that keeps Alembic's CLI happy when no env var is set during ad-hoc commands.

[alembic]
script_location = sprout_registry/migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = sqlite+aiosqlite:///sprout_async.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
