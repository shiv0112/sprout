[project]
name = "sprout-registry-api"
version = "1.0.0"
description = "Self-evolving tool registry for AI agents — runtime, compiler, and HTTP server."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.12"
authors = [
    { name = "Sprout", email = "hello@sprout.dev" },
]
keywords = ["ai", "agents", "tools", "registry", "langchain", "ag2", "autogen", "pydantic-ai", "mistral", "mcp"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

# SDK-only dependencies. With these alone you can:
#   - load a tool from a spec.yaml + impl.py (SproutLoader)
#   - register tools (SproutRegistry)
#   - compile tools to native objects for a target framework (SproutRuntime)
# To run the FastAPI server itself, install with `[server]` extra.
dependencies = [
    "sprout-shared>=1.0.0",
    "pyyaml>=6.0",
    "jsonschema>=4.0",
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
# Run the FastAPI registry server in your own infra:
#     pip install "sprout-registry-api[server]"
server = [
    "sprout-shared[server]>=1.0.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "python-multipart>=0.0.9",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30.0",
    "alembic>=1.14.0",
    "aiosqlite>=0.20.0",
]

# Use Sprout tools natively inside a specific agent framework:
#     pip install "sprout-registry-api[langchain]"
#     pip install "sprout-registry-api[ag2]"
#     pip install "sprout-registry-api[pydantic_ai]"
#     pip install "sprout-registry-api[mistral]"
# Each adapter does a lazy import — install only what you need.
langchain   = ["langchain-core>=0.3.0"]
ag2         = ["pyautogen>=0.3.0"]
pydantic_ai = ["pydantic-ai>=0.0.13"]
mistral     = ["mistralai>=1.0.0"]

# Convenience meta-extras
all = [
    "sprout-registry-api[server]",
    "sprout-registry-api[langchain]",
    "sprout-registry-api[ag2]",
    "sprout-registry-api[pydantic_ai]",
    "sprout-registry-api[mistral]",
]

[project.urls]
Homepage      = "https://github.com/aryabyte21/sprout"
Documentation = "https://github.com/aryabyte21/sprout#readme"
Repository    = "https://github.com/aryabyte21/sprout"
Issues        = "https://github.com/aryabyte21/sprout/issues"

[project.scripts]
sprout-registry = "sprout_registry.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sprout_registry"]

# Local-dev convenience: when working inside the monorepo, resolve
# `sprout-shared` from the sibling workspace package instead of PyPI. This is
# a uv-only directive and is ignored by pip/twine/PyPI consumers.
[tool.uv.sources]
sprout-shared = { workspace = true }
