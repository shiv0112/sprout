[project]
name = "kiln-shared"
version = "1.0.0"
description = "Shared specs, models, and helpers for the Kiln tool registry."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.12"
authors = [
    { name = "Kiln", email = "hello@kiln.dev" },
]
keywords = ["ai", "agents", "tools", "registry", "kiln"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

# Core SDK shape (KilnTool / KilnToolSpec / decorators / schema). Server-only
# helpers (auth, redis cache, rate limiting) require the [server] extra.
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "jsonschema>=4.0",
]

[project.optional-dependencies]
# Auth + caching + rate limiting + JWT verification — only needed by Kiln
# services running as HTTP servers. Plain SDK consumers don't pull these.
server = [
    "pydantic-settings>=2.0",
    "pyjwt[crypto]>=2.8",
    "httpx>=0.27.0",
    "redis>=5.0",
    "slowapi>=0.1.9",
    "starlette>=0.40",
    "prometheus-client>=0.20",
]

[project.urls]
Homepage      = "https://github.com/aryabyte21/kiln"
Documentation = "https://github.com/aryabyte21/kiln#readme"
Repository    = "https://github.com/aryabyte21/kiln"
Issues        = "https://github.com/aryabyte21/kiln/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["kiln_shared"]

[tool.hatch.build.targets.wheel.force-include]
"kiln_shared/py.typed" = "kiln_shared/py.typed"
