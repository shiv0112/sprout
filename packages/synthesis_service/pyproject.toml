[project]
name = "sprout-synthesis-service"
version = "1.0.0"
description = "Sprout Synthesis Service - LLM-powered tool generation via Mistral Vibe"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sprout_synthesis"]
