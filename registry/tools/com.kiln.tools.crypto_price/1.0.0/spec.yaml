kiln_version: "1.0"
tool:
  id: com.kiln.tools.crypto_price
  name: crypto_price
  version: "1.0.0"
  description: "Get real-time cryptocurrency price and 24h change via CoinGecko. No API key required. Supports BTC, ETH, SOL, BNB, and thousands of others."
  author: aria
interface:
  inputs:
    - name: coin_id
      type: string
      description: "CoinGecko coin ID e.g. 'bitcoin', 'ethereum', 'solana', 'binancecoin'"
      required: true
    - name: currency
      type: string
      description: "Target currency code e.g. 'usd', 'sgd', 'eur'"
      required: false
      default: usd
  outputs:
    - name: coin
      type: string
    - name: price
      type: number
    - name: currency
      type: string
    - name: change_24h
      type: number
      description: 24-hour price change percentage
    - name: success
      type: boolean
implementation:
  runtime: python3.10
  entrypoint: crypto_price.py
  dependencies:
    - requests>=2.28.0
testing:
  fixtures:
    - input:
        coin_id: bitcoin
        currency: usd
      expected_output_contains: [price, currency, success]
    - input:
        coin_id: ethereum
        currency: sgd
      expected_output_contains: [coin, price, success]
metadata:
  tags: [crypto, finance, real-time]
  category: finance
