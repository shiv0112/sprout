kiln_version: "1.0"
tool:
  id: com.kiln.tools.generate_qr
  name: generate_qr
  version: "1.0.0"
  description: "Generate a QR code for any text or URL and return it as a base64-encoded PNG image ready for embedding in HTML or saving to disk."
  author: aria
interface:
  inputs:
    - name: content
      type: string
      description: "Text or URL to encode into the QR code"
      required: true
    - name: size
      type: integer
      description: "Box size in pixels per QR module (default 10)"
      required: false
      default: 10
  outputs:
    - name: content
      type: string
    - name: data_url
      type: string
      description: "data:image/png;base64,... ready to use as <img src>"
    - name: file_path
      type: string
      description: Path where the QR PNG was saved
    - name: success
      type: boolean
implementation:
  runtime: python3.10
  entrypoint: generate_qr.py
  dependencies:
    - qrcode>=7.0
    - Pillow>=9.0
testing:
  fixtures:
    - input:
        content: "https://aria.example.com"
      expected_output_contains: [data_url, success]
    - input:
        content: "Hello from ARIA"
        size: 8
      expected_output_contains: [content, data_url, success]
metadata:
  tags: [utility, qr, image]
  category: utility
