kiln_version: "1.0"

tool:
  id: com.kiln.tools.weather_forecast
  name: weather_forecast
  version: 1.0.0
  description: "7-day weather forecast and current conditions via Open-Meteo. Accepts a place name (auto-geocoded) or lat/lon. Supports metric or imperial units. No API key required."
  author: kiln

interface:
  inputs:
    - name: location
      type: string
      description: "City or place name (e.g. 'Singapore', 'Paris, France'). Ignored if lat+lon provided."
      required: false
    - name: lat
      type: number
      description: Latitude in decimal degrees.
      required: false
    - name: lon
      type: number
      description: Longitude in decimal degrees.
      required: false
    - name: days
      type: integer
      description: "Forecast horizon in days (1-14)."
      required: false
      default: 7
    - name: units
      type: string
      description: "'metric' (°C, km/h, mm) or 'imperial' (°F, mph, inch)."
      required: false
      default: "metric"
      enum: ["metric", "imperial"]
  outputs:
    - name: success
      type: boolean
    - name: location
      type: string
    - name: current
      type: object
    - name: forecast
      type: array

implementation:
  runtime: python3.10
  entrypoint: weather_forecast.py
  dependencies:
    - requests>=2.28.0

testing:
  fixtures:
    - input:
        location: "Singapore"
        days: 3
      expected_output_contains: [success, location, current, forecast]

metadata:
  tags: [weather, forecast, geocoding, no-api-key]
  category: data
