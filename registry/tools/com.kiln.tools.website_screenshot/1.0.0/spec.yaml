kiln_version: "1.0"

tool:
  id: com.kiln.tools.website_screenshot
  name: website_screenshot
  version: 1.0.0
  description: "Render a live screenshot of any public URL as a PNG, plus page metadata (title, description, og:image). Uses Microlink's public endpoint — no API key required."
  author: kiln

interface:
  inputs:
    - name: url
      type: string
      description: "Public URL to render."
      required: true
    - name: full_page
      type: boolean
      description: "Capture the whole scrollable page instead of the viewport."
      required: false
      default: false
    - name: device
      type: string
      description: "Device frame: desktop, iphone, ipad, or macbook-pro."
      required: false
      default: "desktop"
      enum: ["desktop", "iphone", "ipad", "macbook-pro"]
    - name: dark
      type: boolean
      description: "Render with prefers-color-scheme: dark."
      required: false
      default: false
  outputs:
    - name: success
      type: boolean
    - name: url
      type: string
      description: The (normalised) URL that was rendered.
    - name: device
      type: string
    - name: full_page
      type: boolean
    - name: dark
      type: boolean
    - name: data_url
      type: string
    - name: file_path
      type: string
    - name: bytes
      type: integer
    - name: meta
      type: object

implementation:
  runtime: python3.10
  entrypoint: website_screenshot.py
  dependencies:
    - requests>=2.28.0
  execution:
    timeout: "60000ms"

testing:
  fixtures:
    - input:
        url: "https://example.com"
      expected_output_contains: [success, data_url, file_path, url]

metadata:
  tags: [web, screenshot, visual, no-api-key]
  category: media
