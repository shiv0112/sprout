sprout_version: "1.0"

tool:
  id: com.sprout.tools.currency_convert
  name: currency_convert
  version: 1.0.0
  description: "Convert a monetary amount from one currency to another. Returns the converted amount and the exchange rate used."
  author: shekhar
  license: MIT

interface:
  inputs:
    - name: amount
      type: number
      required: true
      description: "The amount to convert (must be positive)"
    - name: from_currency
      type: string
      required: true
      description: "Source currency code"
      enum: [USD, SGD, EUR, GBP, JPY, INR]
    - name: to_currency
      type: string
      required: true
      description: "Target currency code"
      enum: [USD, SGD, EUR, GBP, JPY, INR]

  outputs:
    - name: amount
      type: number
      description: "Original amount"
    - name: from_currency
      type: string
    - name: to_currency
      type: string
    - name: converted
      type: number
      description: "Converted amount rounded to 2 decimal places"
    - name: rate
      type: number
      description: "Exchange rate used"
    - name: success
      type: boolean

implementation:
  runtime: python3.10
  entrypoint: currency_convert.py
  dependencies: []
  execution:
    timeout: 3000ms
    retries: 0
    async: false

targets:
  - ag2
  - mistral
  - langchain
  - pydantic_ai

testing:
  fixtures:
    - input:
        amount: 100
        from_currency: USD
        to_currency: SGD
      expected_output_contains:
        - converted
        - rate
        - success
    - input:
        amount: 250
        from_currency: SGD
        to_currency: EUR
      expected_output_contains:
        - converted
        - rate
        - success
    - input:
        amount: 100
        from_currency: USD
        to_currency: INR
      expected_output_contains:
        - converted
        - rate
        - success

metadata:
  tags: [finance, currency, conversion]
  category: finance
  generated_by: human
  generation_timestamp: "2026-02-28T00:00:00Z"
