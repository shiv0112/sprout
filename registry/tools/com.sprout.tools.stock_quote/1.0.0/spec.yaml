sprout_version: "1.0"

tool:
  id: com.sprout.tools.stock_quote
  name: stock_quote
  version: 1.0.0
  description: "Live stock / ETF / crypto quote via Yahoo Finance. Returns price, day change, day range, 52-week range, volume, market state, and a sparkline series for charting. No API key required."
  author: sprout

interface:
  inputs:
    - name: symbol
      type: string
      description: "Ticker symbol (e.g. 'NVDA', 'AAPL', 'BTC-USD', '^GSPC')."
      required: true
    - name: interval
      type: string
      description: "Sparkline interval."
      required: false
      default: "5m"
      enum: ["1m", "5m", "15m", "1h", "1d"]
    - name: range_
      type: string
      description: "Sparkline range."
      required: false
      default: "1d"
      enum: ["1d", "5d", "1mo", "3mo", "1y", "5y", "max"]
  outputs:
    - name: success
      type: boolean
    - name: symbol
      type: string
    - name: price
      type: number
    - name: change
      type: number
    - name: change_pct
      type: number
    - name: sparkline
      type: array

implementation:
  runtime: python3.10
  entrypoint: stock_quote.py
  dependencies:
    - requests>=2.28.0

testing:
  fixtures:
    - input:
        symbol: "NVDA"
      expected_output_contains: [success, symbol, price, sparkline]

metadata:
  tags: [finance, stocks, markets, no-api-key]
  category: data
