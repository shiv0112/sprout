# ─────────────────────────────────────────────────────────────────────────────
# Render Blueprint — Sprout backend (all microservices in ONE service).
#
# Deploy:  Render Dashboard ▸ New ▸ Blueprint ▸ pick this repo. Render reads this
# file, provisions Postgres + Key Value (Redis), and builds docker/Dockerfile.render.
#
# The frontend (packages/registry_ui) is NOT here — it deploys to Vercel.
# See docs/DEPLOYMENT.md for the full walkthrough.
#
# NOTE on sizing: this single service runs 5 Python services + Node + Caddy.
# The 512 MB free/starter instances are NOT enough — use `standard` (2 GB) or up.
# ─────────────────────────────────────────────────────────────────────────────
services:
  - type: web
    name: sprout-backend
    runtime: docker
    repo: https://github.com/shiv0112/sprout
    branch: main
    dockerfilePath: ./docker/Dockerfile.render
    dockerContext: .
    plan: standard              # 2 GB RAM — required to fit all services
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SPROUT_ENV
        value: production

      # ── Managed data stores (auto-wired by this blueprint) ──
      - key: DATABASE_URL
        fromDatabase:
          name: sprout-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sprout-redis
          property: connectionString
      - key: SPROUT_DB_AUTO_CREATE
        value: "true"           # auto-create schema; or run `sprout-registry migrate`

      # ── Inter-service URLs — all local to this one container ──
      - key: REGISTRY_URL
        value: http://127.0.0.1:8766
      - key: SYNTHESIS_URL
        value: http://127.0.0.1:8002
      - key: TOOL_EXECUTOR_URL
        value: http://127.0.0.1:8767
      - key: SPROUT_REGISTRY_URL
        value: http://127.0.0.1:8766
      - key: SPROUT_CALLBACK_URL
        value: http://127.0.0.1:8766/synthesis/callback
      - key: SPROUT_SYNTHESIS_CALLBACK_URL
        value: http://127.0.0.1:8766/synthesis/callback

      # ── LLM providers: NVIDIA NIM primary, Mistral fallback ──
      - key: NVIDIA_API_KEY
        sync: false             # ← primary (NVIDIA NIM / GLM-5.2)
      - key: MISTRAL_API_KEY
        sync: false             # ← fallback + synthesis (Codestral)
      - key: SPROUT_LLM_PRIMARY
        value: nim              # "nim" or "mistral"
      - key: SPROUT_NIM_MODEL
        value: z-ai/glm-5.2     # must support OpenAI tool-calling

      # ── Other secrets & deploy-specific config (set in the dashboard) ──
      - key: SPROUT_INTERNAL_SECRET
        generateValue: true     # Render generates a strong value
      - key: CORS_ORIGINS
        sync: false             # ← your Vercel URL(s), comma-separated
      - key: CLERK_DOMAIN
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      # SPROUT_MCP_ISSUER_URL is derived automatically from Render's injected
      # RENDER_EXTERNAL_URL (+ /mcp) — see sprout_mcp/main.py:_resolve_issuer_url.
      # Set it only to override (e.g. a custom domain).

  # Redis / Key Value — used by chat_backend's leader lock and rate limiting.
  - type: keyvalue
    name: sprout-redis
    plan: free
    region: oregon
    ipAllowList: []             # internal-only (no public access)

databases:
  - name: sprout-postgres
    plan: basic-256mb           # `free` also works for testing (expires in 30 days)
    region: oregon
